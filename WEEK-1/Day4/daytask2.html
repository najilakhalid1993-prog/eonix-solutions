<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronic Items Card Layout using CSS grid</title>
    <link rel="stylesheet" href="day4-2.css">
</head>
<body>
    <h1>Electronic Items</h1>
    <div class="grid-container">
        <div class="card">
        <span class="badge">NEW</span>
        <img src="https://images.pexels.com/photos/11216260/pexels-photo-11216260.jpeg" >
        <h3>Smartphone</h3>
        <p>High perfomance mobile</p>
        <p class="price">Rs 30000</p>
        <button>BUY NOW</button>
</div>
<div class="card">
    <img src="https://images.pexels.com/photos/5663448/pexels-photo-5663448.png" >
    <h3>Laptop</h3>
    <p>Fast and Powerful</p>
    <p class="price">Rs 40000</p>
    <button>BUY NOW</button>

</div>
<div class="card">
    <span class="badge"> OFFER SALE</span>
    <img src="https://images.pexels.com/photos/30428610/pexels-photo-30428610.jpeg" >
    <h3>Headphones</h3>
    <p>Clear sound quality</p>
    <p class="price">Rs 4000</p>
    <button>BUY NOW</button>
</div>
<div class="card">
    <img src="https://images.pexels.com/photos/26606374/pexels-photo-26606374.jpeg" >
    <h3>Camera</h3>
    <p>High resolution camera</p>
    <p class="price">Rs 45000 </p>
    <button>BUY NOW</button>

</div>
<div class="card">
    <img src="https://images.pexels.com/photos/4041181/pexels-photo-4041181.jpeg" >
    <h3>Smart Watch</h3>
    <p>Track your Fitness</p>
    <p class="price">Rs 15000</p>
    <button>BUY NOW</button>

</div>
<div class="card">
    <img src="https://images.pexels.com/photos/9767549/pexels-photo-9767549.jpeg" >
    <h3>Speaker</h3>
    <p>Loud and Clear sound</p>
    <p class="price"> Rs 2000</p>
    <button>BUY NOW</button>

</div>
    </div>
    

</body>
</html>
